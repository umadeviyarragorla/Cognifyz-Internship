<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognifyz Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: orange;
        margin: 0;
        padding: 0;
    }
    .container {
        background: white;
        width: 350px;
        margin: 50px auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    h1 {
        background: green;
        color: white;
        padding: 10px;
        border-radius: 5px;
    }
    #colorBtn {
        background: blue;
        color: white;
        border: none;
        padding: 10px 15px;
        margin: 15px 0;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
    }
    input {
        width: 80%;
        padding: 10px;
        margin: 10px;
        border: 2px solid green;
        border-radius: 5px;
        font-size: 16px;
    }
    button {
        background: blue;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }
    p {
        font-weight: bold;
        font-size: 18px;
        margin-top: 15px;
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        width: 250px;
    }
    .modal-content h3 {
        margin-bottom: 15px;
    }
    .modal-content button {
        background: green;
        color: white;
        border: none;
        padding: 10px 15px;
        font-size: 16px;
        margin-top: 10px;
        cursor: pointer;
        border-radius: 5px;
    }
</style>
</head>
<body>

<!-- Modal Popup -->
<div class="modal" id="welcomeModal">
    <div class="modal-content">
        <h3 id="greeting"></h3>
        <button onclick="closeModal()">Let's Start</button>
    </div>
</div>

<div class="container">
    <h1>Cognifyz Technologies</h1>
    <button id="colorBtn">Click to Change My Colour!</button>
    
    <h2>Basic Calculator</h2>
    
    <input type="number" id="num1" placeholder="Enter first number">
    <br>
    +
    <br>
    <input type="number" id="num2" placeholder="Enter second number">
    <br>
    <button onclick="addNumbers()">ADD</button>
    
    <p>Result: <span id="result"></span></p>
</div>

<script>
    // Show modal when page loads
    window.onload = function() {
        let modal = document.getElementById("welcomeModal");
        let greetingText = document.getElementById("greeting");

        // Get current hour for greeting
        let hour = new Date().getHours();
        if (hour < 12) {
            greetingText.textContent = "Good Morning";
        } else if (hour < 18) {
            greetingText.textContent = "Good Afternoon";
        } else {
            greetingText.textContent = "Good Evening";
        }

        modal.style.display = "flex"; // Show modal
    }

    function closeModal() {
        document.getElementById("welcomeModal").style.display = "none";
    }

    // Change color of button on click
    document.getElementById("colorBtn").addEventListener("click", function() {
        this.style.backgroundColor = this.style.backgroundColor === "blue" ? "purple" : "blue";
    });

    // Function to add two numbers
    function addNumbers() {
        let n1 = parseFloat(document.getElementById("num1").value);
        let n2 = parseFloat(document.getElementById("num2").value);
        if (!isNaN(n1) && !isNaN(n2)) {
            document.getElementById("result").innerText = n1 + n2;
        } else {
            document.getElementById("result").innerText = "Please enter both numbers!";
        }
    }
</script>

</body>
</html>
